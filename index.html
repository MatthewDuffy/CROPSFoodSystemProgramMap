<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROPS Fresh Food Map</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- MarkerCluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<style>
/* ------------------ Base Layout ------------------ */
html, body { margin:0; padding:0; height:100%; }
#map { height:100%; width:100%; }

/* ------------------ CROPS Banner ------------------ */
#crops-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 48px;
  background: #ffffff;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  overflow: hidden;
}

#crops-banner img {
  height: 32px;
  width: auto;
  display: block;
  margin: 8px auto;
}

/* Push map down so banner doesn't cover it */
#map {
  margin-top: 48px;
}

/* ------------------ Bottom Drawer (mobile-first) ------------------ */
#drawer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: -60%;
  height: 60%;
  background: #fff;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -3px 12px rgba(0,0,0,0.25);
  padding: 16px;
  transition: bottom 0.3s ease;
  overflow-y: auto;
  font-family: sans-serif;
  z-index: 9999;
}

#drawer.open { bottom: 0; }

#drawer h2 { margin-top: 0; }

#closeDrawer {
  float: right;
  font-size: 20px;
  cursor: pointer;
}

.navButton {
  display: block;
  width: 100%;
  padding: 12px;
  background: #2b7cff;
  color: white;
  text-align: center;
  border-radius: 8px;
  margin-top: 12px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- CROPS Banner -->
<div id="crops-banner">
  <img src="https://raw.githubusercontent.com/MatthewDuffy/CROPSFoodSystemProgramMap/main/Branding/CROPS_Logo.png" alt="CROPS Logo">
</div>

<!-- Map -->
<div id="map"></div>

<!-- Bottom Drawer -->
<div id="drawer">
  <span id="closeDrawer">✕</span>
  <div id="drawerContent"></div>
</div>

<script>
// Initialize map
const map = L.map('map').setView([39.36, -74.43], 12);

// Basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// Drawer elements
const drawer = document.getElementById('drawer');
const drawerContent = document.getElementById('drawerContent');
document.getElementById('closeDrawer').onclick = () => drawer.classList.remove('open');

// Marker cluster group
const markers = L.markerClusterGroup();

// Load GeoJSON
fetch("https://raw.githubusercontent.com/MatthewDuffy/CROPSFoodSystemProgramMap/main/data/freshfoodlocations.geojson")
  .then(r => r.json())
  .then(data => {
    L.geoJSON(data, {
      pointToLayer: function(feature, latlng) {
        const icon = L.icon({
          iconUrl: feature.properties.icon_url,
          iconSize: [32, 32],
          iconAnchor: [16, 32]
        });
        return L.marker(latlng, { icon: icon });
      },
      onEachFeature: function(feature, layer) {
        layer.on("click", () => {
          showDrawer(feature);
        });
      }
    }).addTo(markers);

    map.addLayer(markers);
    map.fitBounds(markers.getBounds());
  });

// Drawer content builder
function showDrawer(feature) {
  const p = feature.properties;

  drawerContent.innerHTML = `
    <h2>${p.Name}</h2>
    <p><strong>Type:</strong> ${p.Type}</p>
    <p><strong>Address:</strong> ${p.Address}, ${p.City}, ${p.State}</p>
    <p><strong>Hours:</strong> ${p.Hours}</p>
    ${p.Email && p.Email !== "�" ? `<p><strong>Email:</strong> ${p.Email}</p>` : ""}
    ${p.Phone &&
