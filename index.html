<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROPS Fresh Food Map</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- MarkerCluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>
/* ------------------ Base Layout ------------------ */
html, body { margin:0; padding:0; height:100%; }
#map { height:100%; width:100%; }

/* ------------------ CROPS Banner ------------------ */
#crops-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 48px;
  background: #ffffff;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 9999;
  overflow: hidden;
  padding: 0 12px;
}

#crops-banner img {
  height: 32px;
  width: auto;
  display: block;
}

.banner-text {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  color: #333;
}

/* Push map down so banner doesn't cover it */
#map {
  margin-top: 48px;
}

/* ------------------ Bottom Drawer ------------------ */
#drawer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: -60%;
  height: 60%;
  background: #fff;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -3px 12px rgba(0,0,0,0.25);
  padding: 16px;
  transition: bottom 0.3s ease;
  overflow-y: auto;
  font-family: sans-serif;
  z-index: 9999;
}

#drawer.open { bottom: 0; }

#closeDrawer {
  float: right;
  font-size: 20px;
  cursor: pointer;
}

.navButton {
  display: block;
  width: 100%;
  padding: 12px;
  background: #2b7cff;
  color: white;
  text-align: center;
  border-radius: 8px;
  margin-top: 12px;
  text-decoration: none;
  font-weight: bold;
}

.navButton.secondary {
  background: #34c759;
}
