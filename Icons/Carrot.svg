<!-- farmers-market-carrot-rotated-30.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <g transform="rotate(30 32 32)">

    <!-- Carrot body -->
    <path
      d="M32 8
         C26 16, 20 30, 20 42
         C20 54, 26 60, 32 60
         C38 60, 44 54, 44 42
         C44 30, 38 16, 32 8Z"
      fill="#FF8A00"
      stroke="#000"
      stroke-width="3"
      stroke-linejoin="round"/>

    <!-- Texture lines -->
    <path d="M26 30 C30 32, 34 32, 38 30" stroke="#000" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M24 40 C28 42, 36 42, 40 40" stroke="#000" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M28 50 C32 52, 36 52, 40 50" stroke="#000" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Greens (same green as before) -->
    <path d="M28 8 C22 4, 18 2, 14 2" stroke="#2ECC40" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M32 6 C32 2, 34 0, 38 0" stroke="#2ECC40" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M36 8 C42 4, 46 2, 50 2" stroke="#2ECC40" stroke-width="3" stroke-linecap="round" fill="none"/>

  </g>

</svg>
